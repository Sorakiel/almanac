name: CI

# Typecheck, lint, unit-test, and build on every push and PR so regressions are
# caught before they reach main (CLAUDE.md §13 "definition of done").

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm install` (not `npm ci`): the lockfile is generated on macOS and
      # omits Linux-only WASM peer deps (@emnapi/* via @napi-rs/wasm-runtime),
      # which makes strict `npm ci` fail on the Linux runner. `npm install`
      # backfills them at install time.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
