name: Supabase keep-alive

# Supabase's free tier pauses a project after ~7 days with no activity, which
# would make the app cold-start (or fail) the next time a friend opens it. This
# job makes one tiny REST request every day so the project never goes idle.
#
# Requires two repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       e.g. https://xxxxxxxx.supabase.co
#   SUPABASE_ANON_KEY  the public anon key (safe to store as a secret)

on:
  schedule:
    # 06:17 UTC daily. Off the hour on purpose — scheduled runs at :00 are the
    # most congested and most likely to be delayed by GitHub.
    - cron: '17 6 * * *'
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_ANON_KEY repository secret."
            exit 1
          fi

          # A minimal read against a real table runs a Postgres query through
          # PostgREST, keeping both the API and the database warm. Row-Level
          # Security may return zero rows for an anonymous request — that is
          # fine; the query still counts as activity. We only care that the
          # project responds with a 2xx.
          status=$(curl -sS -o /dev/null -w '%{http_code}' \
            "$SUPABASE_URL/rest/v1/quotes?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "Supabase responded with HTTP $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "::error::Keep-alive ping failed (HTTP $status)."
            exit 1
          fi
