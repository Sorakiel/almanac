name: Desktop release

# Builds native desktop installers for all three OSes and attaches them to a
# GitHub Release. macOS can't cross-compile a Windows .exe, so we build each
# target on its own runner. Triggered by pushing a version tag (e.g. v0.1.0).

on:
  push:
    tags: ['v*']
  workflow_dispatch: # allow manual runs from the Actions tab

# tauri-action creates a GitHub Release, which needs write access to repo
# contents. The default GITHUB_TOKEN is read-only, hence the earlier
# "Resource not accessible by integration" failure.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      # Serialize the OS builds. tauri-action merges each platform into the
      # release's existing latest.json, but running the three runners in parallel
      # makes that a read-modify-write race — whoever uploads last wins and the
      # other platforms vanish from the manifest (that's how v0.2.0 shipped with
      # only Windows). One at a time = each build merges into the prior one, so
      # the final latest.json deterministically carries all platforms. Costs wall
      # time; worth it for a correct updater manifest.
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest # -> .dmg (Apple Silicon + Intel universal)
            args: '--target universal-apple-darwin'
          - platform: windows-latest # -> .exe / .msi
            args: ''
          - platform: ubuntu-latest # -> .AppImage / .deb
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal binary needs both arch targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Linux-only system deps for the webkit2gtk webview Tauri wraps.
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build app + bundle installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the SPA at build time. The anon key is safe to expose
          # (RLS enforces per-user access) — store both as repo secrets.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Signs the updater artifacts + latest.json so the app trusts the
          # update (pubkey is pinned in tauri.conf.json).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Almanac ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Guard: fail loudly if the updater manifest lost a platform to the merge race
  # (see max-parallel note above). Catches a broken auto-update in CI instead of
  # letting users silently sit on the old version.
  verify-updater:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Assert latest.json carries every desktop platform
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --pattern latest.json --dir . --clobber
          for key in darwin-aarch64 darwin-x86_64 windows-x86_64 linux-x86_64; do
            if ! jq -e --arg k "$key" '.platforms[$k]' latest.json > /dev/null; then
              echo "::error::latest.json is missing platform '$key' — updater manifest incomplete."
              echo "--- latest.json platforms present: ---"
              jq -r '.platforms | keys[]' latest.json
              exit 1
            fi
          done
          echo "latest.json OK — all desktop platforms present."

  # Android OTA: publish the web bundle + manifest so installed APKs self-update
  # over the air (src/lib/androidUpdater.ts reads android-latest.json). Runs
  # after `build` so tauri-action has already created the release to upload into.
  android-ota:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Zip bundle + write manifest
        run: |
          (cd dist && zip -qr ../android-bundle.zip .)
          VER="${GITHUB_REF_NAME#v}"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/android-bundle.zip"
          printf '{"version":"%s","url":"%s"}\n' "$VER" "$URL" > android-latest.json
          cat android-latest.json

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" android-bundle.zip android-latest.json --clobber

  # Android APK: build the installable app and attach it to the release. OTA only
  # updates the web layer of an ALREADY-installed APK that contains the Capgo
  # plugin, so users need a downloadable bootstrap APK to install once — after
  # that, android-ota keeps the web layer fresh. Debug-signed (no keystore
  # needed); fine for personal sideloading.
  android-apk:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web bundle + sync Capacitor
        run: |
          npm run build
          npx cap sync android
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk "Almanac-${GITHUB_REF_NAME#v}.apk"
          gh release upload "${GITHUB_REF_NAME}" "Almanac-${GITHUB_REF_NAME#v}.apk" --clobber
