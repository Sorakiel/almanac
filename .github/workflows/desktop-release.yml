name: Desktop release

# Builds native desktop installers for all three OSes and attaches them to a
# GitHub Release. macOS can't cross-compile a Windows .exe, so we build each
# target on its own runner. Triggered by pushing a version tag (e.g. v0.1.0).

on:
  push:
    tags: ['v*']
  workflow_dispatch: # allow manual runs from the Actions tab

# tauri-action creates a GitHub Release, which needs write access to repo
# contents. The default GITHUB_TOKEN is read-only, hence the earlier
# "Resource not accessible by integration" failure.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # -> .dmg (Apple Silicon + Intel universal)
            args: '--target universal-apple-darwin'
          - platform: windows-latest # -> .exe / .msi
            args: ''
          - platform: ubuntu-latest # -> .AppImage / .deb
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal binary needs both arch targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Linux-only system deps for the webkit2gtk webview Tauri wraps.
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build app + bundle installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the SPA at build time. The anon key is safe to expose
          # (RLS enforces per-user access) — store both as repo secrets.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Signs the updater artifacts + latest.json so the app trusts the
          # update (pubkey is pinned in tauri.conf.json).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Almanac ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Android OTA: publish the web bundle + manifest so installed APKs self-update
  # over the air (src/lib/androidUpdater.ts reads android-latest.json). Runs
  # after `build` so tauri-action has already created the release to upload into.
  android-ota:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web bundle
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Zip bundle + write manifest
        run: |
          (cd dist && zip -qr ../android-bundle.zip .)
          VER="${GITHUB_REF_NAME#v}"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/android-bundle.zip"
          printf '{"version":"%s","url":"%s"}\n' "$VER" "$URL" > android-latest.json
          cat android-latest.json

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" android-bundle.zip android-latest.json --clobber
